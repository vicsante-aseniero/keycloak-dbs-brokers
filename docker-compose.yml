services:
  mongodb:
    container_name: mongodb-dev    
    image: mongo:latest
    user: "root"
    environment:
      MONGO_INITDB_ROOT_USERNAME: devuser
      MONGO_INITDB_ROOT_PASSWORD: jajnav5@
    networks:
      - backend_network
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/var/opt/mongodb/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  sqlserver:
    container_name: sqlserver-dev
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: "root"
    environment:
      SA_PASSWORD: jajnav5@
      ACCEPT_EULA: Y
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - mssql_data:/var/opt/mssql/data
    deploy:
      resources:
        limits:
          cpus: '2.0' # MSSQL needs more processing power
          memory: 2.5G # Warning: MSSQL often terminates if given less than 2GB
        reservations:
          memory: 2G

  mariadb:
    container_name: mariadb-dev    
    image: mariadb:10.11
    user: "root"    
    environment:
      MARIADB_ROOT_PASSWORD: jajnav5@
      MARIADB_DATABASE: devDb
      MARIADB_USER: devuser
      MARIADB_PASSWORD: JajNav5@2119
    ports:
      - "3306:3306"
    networks:
      - backend_network    
    restart: unless-stopped    
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  postgres:
    container_name: postgres-dev
    image: postgres:latest
    user: "root"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jajnav5@
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_HOST: localhost
      POSTGRES_SSLMODE: disable      
      POSTGRES_MAX_CONNECTIONS: 50 # Reduced connection limits to save memory overhead
    ports:
      - "5432:5432"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:      
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/opt/postgresql/data
      - ./certs/server.crt:/tmp/server.crt:ro
      - ./certs/server.key:/tmp/server.key:ro
    entrypoint: >
      sh -c "
      cp /tmp/server.crt /var/lib/postgresql/server.crt &&
      cp /tmp/server.key /var/lib/postgresql/server.key &&
      chown postgres:postgres /var/lib/postgresql/server.key &&
      chmod 600 /var/lib/postgresql/server.key &&
      exec docker-entrypoint.sh postgres 
      -c ssl=on 
      -c ssl_cert_file=/var/lib/postgresql/server.crt 
      -c ssl_key_file=/var/lib/postgresql/server.key
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  keycloak:
    container_name: keycloak-dev
    image: quay.io/keycloak/keycloak:latest
    user: "root"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: jajnav5@
      KC_DB_SCHEMA: public
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: jajnav5@
      KC_HOSTNAME: http://localhost:9000      
      KC_HTTP_ENABLED: "true"
      KC_FEATURES: web-authn,token-exchange,client-policies,admin-fine-grained-authz,scripts,docker
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY: none      
      JAVA_OPTS: "-Xms512m -Xmx768m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m" # Java Memory options are crucial here
    ports:
      - "9000:8080"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - keycloak_data:/var/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - start-dev
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  phpmyadmin:
    container_name: phpmyadmin_web
    image: phpmyadmin/phpmyadmin:latest    
    user: "root"
    restart: unless-stopped      
    environment:
      PMA_HOST: mariadb      
      PMA_PORT: 3306
    ports:
      - "9080:80"
    networks:
      - backend_network    
    depends_on:
      - mariadb
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    container_name: redis-dev
    image: redis:latest
    user: "root"
    environment:
      REDIS_PASSWORD: jajnav5@
    ports:
      - "6379:6379"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - redis_data:/var/opt/redis/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  rabbitmq:
    container_name: rabbitmq-dev
    image: rabbitmq:3-management
    user: "root"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: jajnav5@
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/opt/rabbitmq/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  localstack:
    container_name: localstack_main
    image: localstack/localstack:latest
    user: "root"    
    environment:
      - ACTIVATE_PRO=0
      - SERVICES=apigateway,s3,sqs,sns,stepfunctions,events,ec2,lambda,kms,iam,acm,transcribe,dynamodb,cloudformation,logs,cloudwatch,ssm,ses,kinesis,route53,opensearch
      - LOCALSTACK_HOST=localstack
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DEBUG=1
    ports:
      - "4566:4566"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-data:/var/lib/localstack"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/4566 && echo -e 'GET /_localstack/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

volumes:
  keycloak_data:
  mongo_data:
  mssql_data:
  mariadb_data:
  postgres_data:
  redis_data:
  rabbitmq_data: