# docker-compose.yml
# Development stack: databases, auth, messaging, tracing, AWS simulation
# Prerequisites:
#   1. Create a .env file from .env.example
#   2. Run ./generate-certs.sh before first start
#   3. Ensure ./init/init.sql exists

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    container_name: mongodb-dev
    image: mongo:8.3
    # mongo image uses UID 999 internally; running as non-root is safer
    user: "999:999"
    profiles: [observability]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - backend_network
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh",
            "--username", "${MONGO_USER}",
            "--password", "${MONGO_PASSWORD}",
            "--authenticationDatabase", "admin",
            "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    container_name: sqlserver-dev
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sqlserver-dev
    # MSSQL requires root or its own internal user; leave as-is for dev
    user: "root"
    profiles: [observability]
    environment:
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_HOSTNAME: "sqlserver-dev"
      MSSQL_USER: ${MSSQL_USER}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD}      
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      TZ: "Asia/Manila"
    ports:
      - "1433:1433"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - mssql_data:/var/opt/mssql/data
    healthcheck:
      # /opt/mssql-tools18/bin ships in newer images; -No disables SSL cert check for dev
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -No -Q 'SELECT 1' > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2.5G
        reservations:
          memory: 2G
    logging: *default-logging

  # ── MariaDB ──────────────────────────────────────────────────────────────────
  mariadb:
    container_name: mariadb-dev
    image: mariadb:10.11
    user: "999:999"
    profiles: [observability]
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: devDb
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging: *default-logging

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    container_name: postgres-dev
    image: postgres:17.5
    # We start as root to fix cert ownership, then exec back to postgres user
    # inside docker-entrypoint.sh — this is the standard pattern for cert setup
    user: "root"
    environment:
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./certs/server.crt:/tmp/server.crt:ro
      - ./certs/server.key:/tmp/server.key:ro
    entrypoint: |
      sh -c "
        # Copy certs to a path we own completely — avoids volume permission issues
        mkdir -p /var/lib/postgresql/certs &&
        cp /tmp/server.crt /var/lib/postgresql/certs/server.crt &&
        cp /tmp/server.key /var/lib/postgresql/certs/server.key &&
        chown -R postgres:postgres /var/lib/postgresql/certs &&
        chmod 600 /var/lib/postgresql/certs/server.key &&
        chmod 644 /var/lib/postgresql/certs/server.crt &&
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/certs/server.crt \
          -c ssl_key_file=/var/lib/postgresql/certs/server.key \
          -c max_connections=50 \
          -c log_connections=on
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
    logging: *default-logging

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    container_name: keycloak-dev
    image: quay.io/keycloak/keycloak:26.2
    user: "999:999"
    profiles: [observability]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: public
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: http://localhost:9000
      KC_HTTP_ENABLED: "true"
      KC_FEATURES: web-authn,token-exchange,client-policies,admin-fine-grained-authz,scripts,docker
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY: none
      KC_JAVA_OPTS: "-Xms512m -Xmx768m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m"
    ports:
      - "9000:8080"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - keycloak_data:/opt/keycloak/data   # ✅ Correct Keycloak data path
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10   # Keycloak takes longer to boot; give it more attempts
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    logging: *default-logging

  # ── PHPMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin-dev
    image: phpmyadmin/phpmyadmin:latest
    profiles: [observability]
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: ${MARIADB_USER}
      PMA_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "9080:80"
    networks:
      - backend_network
    depends_on:
      mariadb:
        condition: service_healthy   # ✅ Wait for MariaDB to be truly ready
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    container_name: redis-dev
    image: redis:8.0
    user: "999:999"
    profiles: [observability]
    command: redis-server --requirepass ${REDIS_PASSWORD} --loglevel notice
    ports:
      - "6379:6379"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging: *default-logging

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    container_name: rabbitmq-dev
    image: rabbitmq:3.13-management
    user: "999:999"
    profiles: [observability]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.8"
    ports:
      - "5672:5672"    # AMQP protocol port
      - "15672:15672"  # Management UI port
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-custom.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s  # give it breathing room on first boot
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging: *default-logging

  # ── Zipkin ───────────────────────────────────────────────────────────────────
  zipkin:
    container_name: zipkin-dev
    image: openzipkin/zipkin:latest
    user: "1000:1000"
    profiles: [observability]
    environment:
      JAVA_OPTS: "--enable-native-access=ALL-UNNAMED"
    ports:
      - "9411:9411"
    networks:
      - backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging: *default-logging

  # ── LocalStack ───────────────────────────────────────────────────────────────
  localstack:
    container_name: localstack-dev
    image: localstack/localstack:4.14
    # LocalStack genuinely needs elevated access for Lambda container management
    user: "root"
    profiles: [observability]
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
      SERVICES: apigateway,s3,sqs,sns,stepfunctions,events,ec2,lambda,kms,iam,acm,transcribe,dynamodb,cloudformation,logs,cloudwatch,ssm,ses,kinesis,route53,opensearch
      LOCALSTACK_HOST: localstack
      DOCKER_HOST: unix:///var/run/docker.sock
      DEBUG: "0"   # Set to "1" only when actively debugging; it's very noisy
      SSL_CERT_ENDPOINT: ""
    ports:
      - "4566:4566"
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - localstack_data:/var/lib/localstack   # ✅ Named volume instead of bind mount
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging: *default-logging

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend_network:
    driver: bridge
    # Give the network an explicit name so it's predictable across projects
    name: dev_backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  mssql_data:
  mariadb_data:
  postgres_data:
  keycloak_data:
  redis_data:
  rabbitmq_data:
  localstack_data:   # ✅ Named volume replaces the bind-mount ./localstack-data